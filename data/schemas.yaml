## Page-Type Schemas
## Defines required and optional fields per page type.
## Consumed by scripts/validate.py

source-pr:
  required:
    - id
    - repo
    - pr
    - title
    - author
    - date
    - url
    - source_category
    - architectures
    - tags
    - techniques
    - hardware_features
    - kernel_types
    - languages
    - captured_at
    - status
  optional:
    - merge_sha
    - description
    - inclusion_reason
    - changed_paths
    - artifact_dir
  disallow_peer_of_artifact_dir:
    - diff_path
    - code_path
    - patch_path
    - key_file_path
  constraints:
    source_category: upstream-code
    status: [open, merged, closed]
    merge_sha_required_when: "status == merged"

source-doc:
  required:
    - id
    - title
    - url
    - source_category
    - architectures
    - tags
    - retrieved_at
  optional:
    - author
    - description
  constraints:
    source_category: [official-doc, paper]

source-blog:
  required:
    - id
    - title
    - author
    - url
    - source_category
    - architectures
    - tags
    - retrieved_at
  optional:
    - description
    - artifact_dir
  disallow_peer_of_artifact_dir:
    - code_path
    - code_dir
  constraints:
    source_category: [benchmark-blog, community-note]

source-contest:
  required:
    - id
    - title
    - source_category
    - architectures
    - tags
  optional:
    - url
    - description
    - problem_number
    - track
    - submissions
    - artifact_dir
  disallow_peer_of_artifact_dir:
    - code_path
  submissions_schema:
    required:
      - rank
      - participant
      - submission_truth
    optional:
      - score
      - technique
      - code_path
      - code_unavailable_reason
    constraints:
      submission_truth: [official-submission, author-published-posthoc, reconstructed-from-blog, unavailable]
      code_path_required_when: "submission_truth != unavailable"
      code_unavailable_reason_required_when: "submission_truth == unavailable"
  constraints:
    source_category: contest-report

wiki-hardware:
  required:
    - id
