## Phase 3: PROVENANCE.yaml schema for asset bundles under artifacts/
## Every asset bundle root (artifacts/prs/<repo>/PR-<N>/,
## artifacts/contests/<contest>/<problem>/submissions/<rank-N-author>/,
## artifacts/blogs/<slug>/code/, artifacts/kernels/<slug>/full/,
## artifacts/kernels/<slug>/variants/) has exactly one PROVENANCE.yaml at its root.
artifact-bundle-provenance:
  required:
    - origin_url
    - upstream_repo
    - license
    - retrieved_at
    - asset_mode
    - files
  optional:
    - upstream_sha
    - derived_from
    - size_cap_truncated
    - license_notice
  constraints:
    asset_mode: [verbatim, extracted, derived]
    derived_from_required_when: "asset_mode == derived"
    upstream_sha_required_when: "asset_mode == verbatim"
  files_schema:
    required:
      - local_path
      - role
      - mode
      - sha256
    optional:
      - upstream_path
      - heading_path
      - size_cap_truncated
    constraints:
      role: [pr-diff, upstream-file, extracted-block, derived-source, approach-notes, bench-record]
      mode: [verbatim, extracted, derived, upstream-patch]
      upstream_path_required_when: "mode in [verbatim, extracted] and upstream_sha present"
      heading_path_required_when: "mode == extracted"

## Phase 3: inclusion-policy.yaml schema
## Defines how PRs from data/cute-dsl-universe.yaml and data/triton-universe.yaml
## are classified for capture.
inclusion-policy:
  required:
    - cute-dsl
    - triton
  lane_schema:
    required:
      - description
      - capture_criteria
      - skip_criteria
    optional:
      - examples

## Phase 3: core-prs.yaml schema (auto-generated by scripts/compute_core_prs.py)
## Ordered, deterministic, content-checksum-verified list of included PR IDs.
core-prs:
  required:
    - generated_at
    - checksum_sha256
    - sources
    - prs
  prs_schema:
    required:
      - id
      - source_of_inclusion
    optional:
      - skipped_reason
    constraints:
      source_of_inclusion: [wiki-graph-closure, contest-reference, cute-dsl-tutorial, triton-in-policy, allowlist]
